services:
  app:
    build:
      context: ../../..
      dockerfile: docker/php/Dockerfile
      args:
        APP_DIR: cases/11-heavy-reporting-blocks-operations/php/app
    container_name: pdsl-11-php-app
    environment:
      APP_STACK: PHP 8.3
    command: ["php", "-S", "0.0.0.0:8080", "-t", "/app", "/app/index.php"]
    ports:
      - "8111:8080"
    healthcheck:
      test: ["CMD", "php", "-r", "echo 'ok';"]
      interval: 10s
      timeout: 3s
      retries: 3
    mem_limit: 320m
    cpus: 0.75
