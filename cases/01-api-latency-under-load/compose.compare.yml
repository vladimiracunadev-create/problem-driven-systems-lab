services:
  db:
    image: postgres:16-alpine
    container_name: pdsl-01-compare-db
    environment:
      POSTGRES_DB: problemlab
      POSTGRES_USER: problemlab
      POSTGRES_PASSWORD: problemlab
    volumes:
      - ./php/db/init:/docker-entrypoint-initdb.d:ro
      - pgdata_case01_compare:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U problemlab -d problemlab"]
      interval: 10s
      timeout: 5s
      retries: 10

  php-app:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: pdsl-01-php-compare
    environment:
      APP_STACK: PHP 8.3
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: problemlab
      DB_USER: problemlab
      DB_PASSWORD: problemlab
      WORKER_NAME: report-refresh
    command: ["php", "-S", "0.0.0.0:8080", "-t", "/app", "/app/index.php"]
    ports:
      - "811:8080"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: pdsl-01-worker-compare
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: problemlab
      DB_USER: problemlab
      DB_PASSWORD: problemlab
      WORKER_NAME: report-refresh
      WORKER_LOOKBACK_DAYS: "45"
      WORKER_INTERVAL_SECONDS: "20"
    command: ["php", "/app/worker.php"]
    depends_on:
      db:
        condition: service_healthy

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: pdsl-01-postgres-exporter-compare
    environment:
      DATA_SOURCE_NAME: postgresql://problemlab:problemlab@db:5432/problemlab?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      db:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: pdsl-01-prometheus-compare
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=3d
    volumes:
      - ./shared/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_case01_compare:/prometheus
    ports:
      - "9091:9090"
    depends_on:
      - php-app
      - postgres-exporter

  grafana:
    image: grafana/grafana:11.0.0
    container_name: pdsl-01-grafana-compare
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./shared/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./shared/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_case01_compare:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  loadtest:
    image: python:3.12-alpine
    working_dir: /work
    volumes:
      - ./shared/loadtest:/work
    entrypoint: ["python", "run.py"]
    environment:
      TARGET_URL: http://php-app:8080/report-legacy?days=30&limit=20
      REQUESTS: "30"
      CONCURRENCY: "5"
      TIMEOUT_SECONDS: "20"
      TEST_NAME: case01-default
    depends_on:
      - php-app
      - worker

volumes:
  pgdata_case01_compare:
  prometheus_case01_compare:
  grafana_case01_compare:
