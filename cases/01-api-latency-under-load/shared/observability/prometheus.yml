global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: case01_app
    metrics_path: /metrics-prometheus
    static_configs:
      - targets: ['app:8080']

  - job_name: case01_php_app_compare
    metrics_path: /metrics-prometheus
    static_configs:
      - targets: ['php-app:8080']

  - job_name: case01_postgres_exporter
    static_configs:
      - targets: ['postgres-exporter:9187']
