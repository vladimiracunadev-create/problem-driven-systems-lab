global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Despues del refactor a php-dispatcher, el caso 01 PHP vive como subproceso
  # interno del contenedor php-lab. Prometheus lo scrapea via el dispatcher
  # en /01/metrics-prometheus (path routing del dispatcher PHP).
  - job_name: case01_app
    metrics_path: /01/metrics-prometheus
    static_configs:
      - targets: ['php-lab:8100']

  - job_name: case01_postgres_exporter
    static_configs:
      - targets: ['postgres-exporter:9187']
