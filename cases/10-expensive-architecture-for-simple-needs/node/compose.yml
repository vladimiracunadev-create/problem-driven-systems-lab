services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdsl-10-node-app
    ports:
      - "8210:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8080/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
