services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdsl-07-php-app
    environment:
      APP_STACK: PHP 8.3
    command: ["php", "-S", "0.0.0.0:8080", "-t", "/app", "/app/index.php"]
    ports:
      - "817:8080"
    healthcheck:
      test: ["CMD", "php", "-r", "echo 'ok';"]
      interval: 10s
      timeout: 3s
      retries: 3
    mem_limit: 256m
    cpus: 0.75
