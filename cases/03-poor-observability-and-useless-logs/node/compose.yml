services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdsl-03-node-app
    ports:
      - "823:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
