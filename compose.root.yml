# compose.root.yml — Stack PHP completo (los 12 casos + portal + servicios reales)
#
# Despues del refactor a php-dispatcher: los 12 casos PHP corren como
# subprocesos internos en :9001-:9012 dentro de un solo contenedor `php-lab`,
# espejo del modelo de compose.python.yml y compose.nodejs.yml.
#
# Servicios que SI siguen siendo contenedores separados (no son PHP, son
# servicios reales que el caso 01 estudia):
#   - case01-db / case02-db: PostgreSQL real
#   - case01-worker:         worker PHP CLI (long-running, no HTTP)
#   - case01-postgres-exporter / case01-prometheus / case01-grafana: observabilidad
#
# Uso:
#   docker compose -f compose.root.yml up -d --build
#   docker compose -f compose.root.yml down
#
# Endpoints:
#   http://localhost:8080         portal
#   http://localhost:8100/        index del PHP hub (12 casos via /XX/...)
#   http://localhost:8100/01/...  caso 01 (con DB real)
#   http://localhost:8100/12/...  caso 12
#   http://localhost:9091         Prometheus
#   http://localhost:3001         Grafana

x-php-build: &php-build
  context: .
  dockerfile: docker/php/Dockerfile

services:

  # ---------------------------------------------------------------------------
  # Portal HTML (Apache + PHP)
  # ---------------------------------------------------------------------------

  portal-php8:
    build:
      context: ./portal
      dockerfile: Dockerfile
    container_name: pdsl-portal-php8
    ports:
      - "${PORTAL_PORT:-8080}:80"
    volumes:
      - ./portal/app:/var/www/html
      - ./shared/catalog:/workspace/shared/catalog:ro
    environment:
      APP_NAME: "Problem-Driven Systems Lab"
      PDSL_PROBE_HOST: "host.docker.internal"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - case01
      - case02

  # ---------------------------------------------------------------------------
  # PHP Lab — un solo contenedor, los 12 casos como subprocesos internos
  # Sustituye al antiguo nginx php-hub + 12 caseXX-app separados.
  # ---------------------------------------------------------------------------

  php-lab:
    build:
      context: .
      dockerfile: php-dispatcher/Dockerfile
    container_name: pdsl-php-lab
    ports:
      - "8100:8100"
    environment:
      APP_STACK: PHP 8.3
      # Casos 01 y 02 conectan a sus PostgreSQL reales por DNS de Docker.
      CASE01_DB_HOST: case01-db
      CASE01_DB_NAME: problemlab
      CASE01_DB_USER: problemlab
      CASE01_DB_PASSWORD: problemlab
      WORKER_NAME: report-refresh
      CASE02_DB_HOST: case02-db
      CASE02_DB_NAME: problemlab
      CASE02_DB_USER: problemlab
      CASE02_DB_PASSWORD: problemlab
    depends_on:
      case01-db:
        condition: service_healthy
      case02-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(@file_get_contents('http://127.0.0.1:8100/03/health') !== false ? 0 : 1);\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    mem_limit: 1024m
    cpus: 2.0
    restart: unless-stopped
    networks:
      - default
      - case01
      - case02

  # ---------------------------------------------------------------------------
  # Caso 01 — PostgreSQL + worker + Prometheus + Grafana
  # (servicios reales que el caso estudia — NO se colapsan)
  # ---------------------------------------------------------------------------

  case01-db:
    image: postgres:16-alpine
    container_name: pdsl-01-php-db
    environment:
      POSTGRES_DB: problemlab
      POSTGRES_USER: problemlab
      POSTGRES_PASSWORD: problemlab
    volumes:
      - ./cases/01-api-latency-under-load/php/db/init:/docker-entrypoint-initdb.d:ro
      - pgdata_case01:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U problemlab -d problemlab"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 1024m
    cpus: 1.50
    networks:
      case01:
        aliases:
          - db

  case01-worker:
    build:
      <<: *php-build
      args:
        APP_DIR: cases/01-api-latency-under-load/php/app
    container_name: pdsl-01-php-worker
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: problemlab
      DB_USER: problemlab
      DB_PASSWORD: problemlab
      WORKER_NAME: report-refresh
      WORKER_LOOKBACK_DAYS: "45"
      WORKER_INTERVAL_SECONDS: "20"
    command: ["php", "/app/worker.php"]
    depends_on:
      case01-db:
        condition: service_healthy
    mem_limit: 256m
    cpus: 0.75
    networks:
      case01:

  case01-postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: pdsl-01-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://problemlab:problemlab@db:5432/problemlab?sslmode=disable
    depends_on:
      case01-db:
        condition: service_healthy
    networks:
      case01:
        aliases:
          - postgres-exporter

  case01-prometheus:
    image: prom/prometheus:v2.52.0
    container_name: pdsl-01-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=3d
    volumes:
      - ./cases/01-api-latency-under-load/shared/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_case01:/prometheus
    ports:
      - "9091:9090"
    depends_on:
      - php-lab
      - case01-postgres-exporter
    networks:
      case01:

  case01-grafana:
    image: grafana/grafana:11.0.0
    container_name: pdsl-01-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./cases/01-api-latency-under-load/shared/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./cases/01-api-latency-under-load/shared/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_case01:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - case01-prometheus
    networks:
      case01:

  # ---------------------------------------------------------------------------
  # Caso 02 — PostgreSQL
  # ---------------------------------------------------------------------------

  case02-db:
    image: postgres:16-alpine
    container_name: pdsl-02-php-db
    environment:
      POSTGRES_DB: problemlab
      POSTGRES_USER: problemlab
      POSTGRES_PASSWORD: problemlab
    volumes:
      - ./cases/02-n-plus-one-and-db-bottlenecks/php/db/init:/docker-entrypoint-initdb.d:ro
      - pgdata_case02:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U problemlab -d problemlab"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 768m
    cpus: 1.25
    networks:
      case02:
        aliases:
          - db

volumes:
  pgdata_case01:
  prometheus_case01:
  grafana_case01:
  pgdata_case02:

networks:
  default:
  case01:
  case02:
