# compose.python.yml — Stack Python completo (los 12 casos)
#
# Convención de este repositorio:
#   compose.root.yml    → PHP   (todos los casos, con DB y observabilidad donde aplica)
#   compose.python.yml  → Python (todos los casos, stdlib pura, sin dependencias externas)
#   compose.{lang}.yml  → patrón para cada lenguaje futuro (Node.js, Java, .NET, etc.)
#
# Los compose.yml individuales dentro de cada caso siguen existiendo para
# ejecución aislada de un solo caso. Este archivo es el punto de entrada
# único para levantar el stack Python completo.
#
# Puertos Python: 831–839 (casos 01–09), 8310–8312 (casos 10–12)
# Puertos PHP:    811–819 (casos 01–09), 8110–8112 (casos 10–12)
# No hay colisión: ambos stacks pueden correr en paralelo.
#
# Uso:
#   docker compose -f compose.python.yml up -d --build
#   docker compose -f compose.python.yml down
#   docker compose -f compose.python.yml logs -f case01-python

x-python-app: &python-app
  environment:
    APP_STACK: Python 3.12
  healthcheck:
    test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2).read()\""]
    interval: 10s
    timeout: 3s
    retries: 5
    start_period: 5s
  mem_limit: 128m
  cpus: 0.50
  restart: unless-stopped

services:

  case01-python:
    <<: *python-app
    build:
      context: cases/01-api-latency-under-load/python
      dockerfile: Dockerfile
    container_name: pdsl-01-python-app
    ports:
      - "831:8080"

  case02-python:
    <<: *python-app
    build:
      context: cases/02-n-plus-one-and-db-bottlenecks/python
      dockerfile: Dockerfile
    container_name: pdsl-02-python-app
    ports:
      - "832:8080"

  case03-python:
