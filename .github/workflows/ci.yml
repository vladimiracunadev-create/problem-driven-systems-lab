name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Check generated catalog
        run: php scripts/generate_case_catalog.php --check

      - name: Validate repository structure
        run: bash scripts/validate-structure.sh

  compose-config:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compose_file:
          - compose.root.yml
          - compose.portal.yml
          - cases/01-api-latency-under-load/php/compose.yml
          - cases/02-n-plus-one-and-db-bottlenecks/php/compose.yml
          - cases/03-poor-observability-and-useless-logs/php/compose.yml
          - cases/04-timeout-chain-and-retry-storms/php/compose.yml
          - cases/05-memory-pressure-and-resource-leaks/php/compose.yml
          - cases/06-broken-pipeline-and-fragile-delivery/php/compose.yml
          - cases/07-incremental-monolith-modernization/php/compose.yml
          - cases/08-critical-module-extraction-without-breaking-operations/php/compose.yml
          - cases/09-unstable-external-integration/php/compose.yml
          - cases/10-expensive-architecture-for-simple-needs/php/compose.yml
          - cases/11-heavy-reporting-blocks-operations/php/compose.yml
          - cases/12-single-point-of-knowledge-and-operational-risk/php/compose.yml
          - cases/03-poor-observability-and-useless-logs/node/compose.yml
          - cases/03-poor-observability-and-useless-logs/python/compose.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker compose file
        run: docker compose -f ${{ matrix.compose_file }} config > /dev/null

  compose-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: portal
            compose_file: compose.portal.yml
            probe_url: http://127.0.0.1:8080/
          - name: case01-php
            compose_file: cases/01-api-latency-under-load/php/compose.yml
            probe_url: http://127.0.0.1:811/health
          - name: case02-php
            compose_file: cases/02-n-plus-one-and-db-bottlenecks/php/compose.yml
            probe_url: http://127.0.0.1:812/health
          - name: case03-php
            compose_file: cases/03-poor-observability-and-useless-logs/php/compose.yml
            probe_url: http://127.0.0.1:813/health
          - name: case04-php
            compose_file: cases/04-timeout-chain-and-retry-storms/php/compose.yml
            probe_url: http://127.0.0.1:814/health
          - name: case05-php
            compose_file: cases/05-memory-pressure-and-resource-leaks/php/compose.yml
            probe_url: http://127.0.0.1:815/health
          - name: case06-php
            compose_file: cases/06-broken-pipeline-and-fragile-delivery/php/compose.yml
            probe_url: http://127.0.0.1:816/health
          - name: case07-php
            compose_file: cases/07-incremental-monolith-modernization/php/compose.yml
            probe_url: http://127.0.0.1:817/health
          - name: case08-php
            compose_file: cases/08-critical-module-extraction-without-breaking-operations/php/compose.yml
            probe_url: http://127.0.0.1:818/health
          - name: case09-php
            compose_file: cases/09-unstable-external-integration/php/compose.yml
            probe_url: http://127.0.0.1:819/health
          - name: case10-php
            compose_file: cases/10-expensive-architecture-for-simple-needs/php/compose.yml
            probe_url: http://127.0.0.1:8110/health
          - name: case11-php
            compose_file: cases/11-heavy-reporting-blocks-operations/php/compose.yml
            probe_url: http://127.0.0.1:8111/health
          - name: case12-php
            compose_file: cases/12-single-point-of-knowledge-and-operational-risk/php/compose.yml
            probe_url: http://127.0.0.1:8112/health
          - name: case03-node
            compose_file: cases/03-poor-observability-and-useless-logs/node/compose.yml
            probe_url: http://127.0.0.1:823/health
          - name: case03-python
            compose_file: cases/03-poor-observability-and-useless-logs/python/compose.yml
            probe_url: http://127.0.0.1:833/health
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and boot ${{ matrix.name }}
        run: docker compose -f ${{ matrix.compose_file }} up -d --build

      - name: Probe ${{ matrix.name }}
        shell: bash
        run: |
          for attempt in {1..40}; do
            if curl -fsS "${{ matrix.probe_url }}" > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f "${{ matrix.compose_file }}" ps
          docker compose -f "${{ matrix.compose_file }}" logs
          exit 1

      - name: Shutdown ${{ matrix.name }}
        if: always()
        run: docker compose -f ${{ matrix.compose_file }} down -v

  portal-probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and boot laboratorio PHP completo
        run: docker compose -f compose.root.yml up -d --build

      - name: Wait for case01 health
        shell: bash
        run: |
          for attempt in {1..50}; do
            if curl -fsS "http://127.0.0.1:811/health" > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f compose.root.yml logs
          exit 1

      - name: Validate portal probe endpoint
        run: curl -fsS "http://127.0.0.1:8080/probe.php?case_id=01&stack=php"

      - name: Shutdown laboratorio PHP completo
        if: always()
        run: docker compose -f compose.root.yml down -v
