# php-hub.conf — reverse proxy para los 12 casos PHP
#
# Enruta por prefijo de path hacia cada caso interno.
# Los casos PHP corren en su propia red Docker y nunca
# exponen puertos al host — solo este nginx lo hace.
#
# Rutas:
#   GET http://localhost:8100/       → índice de casos
#   GET http://localhost:8100/01/... → caso 01 (pdsl-01-php-app:8080)
#   GET http://localhost:8100/12/... → caso 12 (pdsl-12-php-app:8080)

server {
    listen 80;
    server_name _;

    # Índice — muestra todos los casos disponibles
    location = / {
        default_type application/json;
        return 200 '{"lab":"Problem-Driven Systems Lab","stack":"PHP 8.3","info":"PHP Hub — un puerto, 12 casos.","usage":"GET /{caso}/{ruta}  e.g. /01/health, /02/query","cases":{"/01/":"API lenta bajo carga","/02/":"N+1 y cuellos de botella DB","/03/":"Observabilidad deficiente","/04/":"Timeout chain y retry storms","/05/":"Presion de memoria y fugas","/06/":"Pipeline roto y delivery fragil","/07/":"Modernizacion incremental monolito","/08/":"Extraccion critica de modulo","/09/":"Integracion externa inestable","/10/":"Arquitectura cara para algo simple","/11/":"Reportes que bloquean la operacion","/12/":"Punto unico de conocimiento"}}';
    }

    location /01/ {
        proxy_pass         http://pdsl-01-php-app:8080/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Case-ID         01;
        proxy_read_timeout 120s;
    }

    location /02/ {
        proxy_pass         http://pdsl-02-php-app:8080/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Case-ID         02;
        proxy_read_timeout 120s;
    }

    location /03/ {
        proxy_pass         http://pdsl-03-php-app:8080/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Case-ID         03;
        proxy_read_timeout 120s;
    }

